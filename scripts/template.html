  // "a=1&b=2" query string, so it can be parsed and shown as a nested table.
  function detectNested(value, depth) {
    if (depth >= MAX_NEST_DEPTH || !value) return null;

    var candidate = value;
    try {
      var decodedOnce = decodeURIComponent(value);
      if (decodedOnce !== value) candidate = decodedOnce;
    } catch (e) { /* leave as-is on invalid escape sequences */ }

    var qIdx = candidate.indexOf("?");
    if (qIdx !== -1 && /^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(candidate)) {
      var qs = candidate.slice(qIdx + 1).split("#")[0];
      if (isQueryStringLike(qs)) return qs;
    }

    if (candidate.indexOf("&") !== -1 && isQueryStringLike(candidate)) {
      return candidate;
    }

    return null;
  }

  function keyColorVar(index) {
    return index < CAT_SLOTS ? "var(--cat-" + (index + 1) + ")" : "var(--text-muted)";
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function render(entries) {
    currentEntries = entries;

    if (!entries.length) {
      results.hidden = true;
      emptyState.hidden = false;
      return;
    }
    emptyState.hidden = true;
    results.hidden = false;

    var uniqueKeys = [];
    entries.forEach(function (e) {
      if (uniqueKeys.indexOf(e.key) === -1) uniqueKeys.push(e.key);
    });

    var duplicateKeyCount = uniqueKeys.filter(function (k) {
      return entries.filter(function (e) { return e.key === k; }).length > 1;
    }).length;

    var jsonCount = entries.filter(function (e) { return detectType(e.value) === "json"; }).length;

    renderStats({
      total: entries.length,
      unique: uniqueKeys.length,
      duplicates: duplicateKeyCount,
      json: jsonCount
    });

    tableBody.innerHTML = buildRowsHtml(entries, 0);
  }

  function renderStats(s) {
    var tiles = [
      { val: s.total, lbl: t("statTotal") },
      { val: s.unique, lbl: t("statUnique") },
      { val: s.duplicates, lbl: t("statDup") },
      { val: s.json, lbl: t("statJson") }
    ];
    statsEl.innerHTML = tiles.map(function (tile) {
      return '<div class="stat-tile"><div class="val">' + tile.val + '</div><div class="lbl">' + tile.lbl + '</div></div>';
    }).join("");
  }

  function renderValueCell(value) {
    var type = detectType(value);
    if (type === "empty") {
      return '<span class="val-empty">' + escapeHtml(t("valEmpty")) + '</span>';
    }
    if (type === "json") {
      try {
        var pretty = JSON.stringify(JSON.parse(value), null, 2);
        return '<pre>' + escapeHtml(pretty) + '</pre>';
      } catch (e) { /* fall through */ }
    }
    return escapeHtml(value);
  }

  function buildRowsHtml(entries, depth) {
    var uniqueKeys = [];
    var keyIndex = Object.create(null);
    entries.forEach(function (e) {
      if (!(e.key in keyIndex)) {
        keyIndex[e.key] = uniqueKeys.length;
        uniqueKeys.push(e.key);
      }
    });

    return entries.map(function (e) {
      var type = detectType(e.value);
      var dot = '<span class="dot" style="background:' + keyColorVar(keyIndex[e.key]) + '"></span>';
      var dup = e.total > 1
        ? '<span class="dup-badge">' + e.occurrence + '/' + e.total + '</span>'
        : '';

      var valueHtml = renderValueCell(e.value);
      var nestedQs = detectNested(e.value, depth);
      if (nestedQs) {
        var nestedEntries = parseQueryStringEntries(nestedQs);
        if (nestedEntries.length) {
          var nestedId = "nested-" + (nestedIdCounter++);
          valueHtml +=
            '<button class="nested-toggle" type="button" data-toggle-nested="' + nestedId + '">' +
              escapeHtml(t("nestedExpand").replace("{n}", nestedEntries.length)) +
            '</button>' +
            '<div class="nested-block" id="' + nestedId + '" hidden>' +
              '<table class="nested-table"><tbody>' + buildRowsHtml(nestedEntries, depth + 1) + '</tbody></table>' +
            '</div>';
        }
      }

      return (
        '<tr>' +
          '<td><div class="key-cell">' + dot + escapeHtml(e.key) + dup + '</div></td>' +
          '<td class="val-cell">' + valueHtml + '</td>' +
          '<td><span class="type-badge">' + type + '</span></td>' +
          '<td class="copy-cell"><button class="copy-btn" data-copy-value="' + escapeHtml(e.value) + '" type="button">' + escapeHtml(t("copy")) + '</button></td>' +
        '</tr>'
      );
    }).join("");
  }

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (e) { /* ignore */ }
    document.body.removeChild(ta);
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(function () {
        fallbackCopy(text);
      });
    }
    fallbackCopy(text);
    return Promise.resolve();
  }

  function flashCopied(btn, label) {
    var original = btn.textContent;
    btn.textContent = label || t("copied");
    btn.classList.add("copied");
    setTimeout(function () {
      btn.textContent = original;
      btn.classList.remove("copied");
    }, 1200);
  }

  tableBody.addEventListener("click", function (ev) {
    var copyBtn = ev.target.closest("[data-copy-value]");
    if (copyBtn) {
      copyToClipboard(copyBtn.getAttribute("data-copy-value")).then(function () { flashCopied(copyBtn); });
      return;
    }
    var toggleBtn = ev.target.closest("[data-toggle-nested]");
    if (toggleBtn) {
      var block = document.getElementById(toggleBtn.getAttribute("data-toggle-nested"));
      if (!block) return;
      var willShow = block.hidden;
      block.hidden = !willShow;
      if (willShow) {
        toggleBtn.textContent = t("nestedCollapse");
      } else {
        var n = block.querySelectorAll(":scope > table > tbody > tr").length;
        toggleBtn.textContent = t("nestedExpand").replace("{n}", n);
      }
    }
  });

  copyJsonBtn.addEventListener("click", function () {
    var obj = {};
    currentEntries.forEach(function (e) {
      if (e.key in obj) {
        if (!Array.isArray(obj[e.key])) obj[e.key] = [obj[e.key]];
        obj[e.key].push(e.value);
      } else {
        obj[e.key] = e.value;
      }
    });
    copyToClipboard(JSON.stringify(obj, null, 2)).then(function () {
      flashCopied(copyJsonBtn, t("copiedJson"));
    });
  });

  function doParse() {
    render(parseEntries(urlInput.value));
  }

  parseBtn.addEventListener("click", doParse);
  urlInput.addEventListener("keydown", function (ev) {
    if (ev.key === "Enter") doParse();
  });
  exampleBtn.addEventListener("click", function () {
    urlInput.value = EXAMPLE_URL;
    doParse();
  });
  clearBtn.addEventListener("click", function () {
    urlInput.value = "";
    render([]);
    urlInput.focus();
  });

  // theme toggle
  var THEME_KEY = "qpv-theme";
  function applyTheme(theme) {
    if (theme === "light" || theme === "dark") {
      document.documentElement.setAttribute("data-theme", theme);
    } else {
      document.documentElement.removeAttribute("data-theme");
    }
  }
  var savedTheme = null;
  try { savedTheme = localStorage.getItem(THEME_KEY); } catch (e) { /* ignore */ }
  applyTheme(savedTheme);
  themeToggle.addEventListener("click", function () {
    var current = document.documentElement.getAttribute("data-theme");
    var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    var effectiveDark = current ? current === "dark" : prefersDark;
    var next = effectiveDark ? "light" : "dark";
    applyTheme(next);
    try { localStorage.setItem(THEME_KEY, next); } catch (e) { /* ignore */ }
  });

  // language switch: progressive enhancement over the plain <a href> links —
  // swap all page text client-side (no reload, keeps input/parsed state) and
  // sync the URL bar via pushState; without JS the links still navigate to
  // the real static per-language page.
  function setMeta(selector, attr, value) {
    var el = document.querySelector(selector);
    if (el) el.setAttribute(attr, value);
  }

  function applyLangToDom(lang) {
    if (!I18N_ALL[lang] || lang === currentLang) return;
    currentLang = lang;
    var dict = I18N_ALL[lang];

    document.documentElement.lang = dict.htmlLang;
    document.title = dict.title;

    setMeta('meta[name="description"]', "content", dict.description);
    setMeta('meta[name="keywords"]', "content", dict.keywords);
    setMeta('meta[property="og:title"]', "content", dict.title);
    setMeta('meta[property="og:description"]', "content", dict.ogDescription);
    setMeta('meta[property="og:url"]', "content", CANONICALS[lang]);
    setMeta('meta[property="og:locale"]', "content", dict.ogLocale);
    setMeta('meta[name="twitter:title"]', "content", dict.title);
    setMeta('meta[name="twitter:description"]', "content", dict.ogDescription);
    setMeta('link[rel="canonical"]', "href", CANONICALS[lang]);

    taglineEl.textContent = dict.tagline;
    urlInput.placeholder = dict.inputPlaceholder;
    parseBtn.textContent = dict.btnParse;
    exampleBtn.textContent = dict.btnExample;
    clearBtn.textContent = dict.btnClear;
    hintEl.innerHTML = dict.hintHtml;
    emptyTextEl.textContent = dict.emptyText;
    tableTitleEl.textContent = dict.tableTitle;
    copyJsonBtn.textContent = dict.copyJsonBtn;
    footerEl.textContent = dict.footer;
    themeToggle.title = dict.themeToggleLabel;
    themeToggle.setAttribute("aria-label", dict.themeToggleLabel);

    document.querySelectorAll(".lang-switch a").forEach(function (a) {
      if (a.getAttribute("data-lang") === lang) a.setAttribute("aria-current", "true");
      else a.removeAttribute("aria-current");
    });

    if (currentEntries.length) render(currentEntries);
  }

  function detectLangFromPath() {
    var path = window.location.pathname;
    if (/\/en\/?(?:index\.html)?$/.test(path)) return "en";
    if (/\/ja\/?(?:index\.html)?$/.test(path)) return "ja";
    return "zh";
  }

  document.querySelectorAll(".lang-switch a").forEach(function (a) {
    a.addEventListener("click", function (ev) {
      var lang = a.getAttribute("data-lang");
      if (!lang || lang === currentLang) { ev.preventDefault(); return; }
      ev.preventDefault();
      applyLangToDom(lang);
      history.pushState({ lang: lang }, "", a.getAttribute("href"));
    });
  });

  window.addEventListener("popstate", function (ev) {
    applyLangToDom((ev.state && ev.state.lang) || detectLangFromPath());
  });

  // auto-load from current page URL if it carries its own query/hash params
  var selfHref = window.location.href;
  var selfQs = extractQueryString(selfHref);
  if (selfQs) {
    urlInput.value = selfHref;
    doParse();
  } else {
    render([]);
  }
})();
</script>
</body>
</html>
