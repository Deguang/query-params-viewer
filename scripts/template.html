  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  /* Icons are <use> references into the inline sprite at the top of <body>.

     selectors cannot reach into a <use> shadow tree) and resolve to

     including the white label of a selected tab. */
  .icon {
    width: 14px;

  header {

  /* A row of languages stopped fitting in the header once there were more than

     widget: it opens and closes natively, which keeps the switcher usable —
     and its links crawlable — with scripting off. */

    position: relative;
    flex: none;

  .lang-menu > summary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 36px;
    padding: 0 9px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface-1);
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    list-style: none; /* Firefox */
  }
  .lang-menu > summary::-webkit-details-marker { display: none; }
  .lang-menu > summary:hover { color: var(--text-primary); border-color: var(--series-1); }
  .lang-menu > summary .caret { width: 12px; height: 12px; color: var(--text-muted); }
  .lang-menu[open] > summary .caret { transform: rotate(180deg); }
  .lang-switch {
    position: absolute;
    right: 0;
    top: calc(100% + 6px);
    z-index: 20;
    display: flex;
    flex-direction: column;
    min-width: 150px;
    padding: 4px;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 24px var(--grid);
    font-size: 13px;
  }
  .lang-switch a {
    color: var(--text-secondary);
    text-decoration: none;
    padding: 7px 10px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .lang-switch a:hover { color: var(--text-primary); background: var(--page); }
  .lang-switch a[aria-current="true"] {
    color: var(--text-primary);
    font-weight: 600;
  }
  .theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    background: var(--surface-1);
    color: var(--text-secondary);
    border-radius: 4px;
    width: 36px;
    height: 36px;
    font-size: 16px;
    cursor: pointer;
    flex: none;
  }
  .theme-toggle:hover { color: var(--text-primary); border-color: var(--series-1); }

  .view-tabs {
    display: inline-flex;
    gap: 2px;
    margin-bottom: 16px;

    border-radius: 8px;
  }
  .view-tab {

    font-weight: 600;

    letter-spacing: 0.05em;
    padding: 9px 18px;

  .view-tab:hover { color: var(--text-primary); }

    background: var(--series-1);

  .card {

    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .input-row input[type="text"]:focus {
    outline: 2px solid var(--series-1);
    outline-offset: -1px;
  }
  .btn {
    /* Flex rather than relying on vertical-align: keeps a button's icon and

    align-items: center;
    justify-content: center;
    gap: 6px;
    border: 1px solid var(--border);
    background: var(--page);
    color: var(--text-primary);

    padding: 10px 14px;

    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--series-1); }
  .btn-primary {

  .btn-primary:hover { filter: brightness(1.05); }

  .hint {

  .stat-tile .val {

  .nested-toggle {

  }

  /* Four distinct hues so status never relies on the badge text alone:

  /* Only rows needing attention are tinted -- unchanged rows stay clean, so a
     long diff can be scanned without reading the status column. The left
     accent carries the same signal for anyone who cannot separate the tints,
     and still renders where color-mix() is unsupported. */
  #compareTable tbody tr.row-diff  { background: color-mix(in srgb, var(--warning)  12%, transparent); }
  #compareTable tbody tr.row-onlyA { background: color-mix(in srgb, var(--critical) 12%, transparent); }
  #compareTable tbody tr.row-onlyB { background: color-mix(in srgb, var(--series-1) 12%, transparent); }
  /* Fixed layout so A and B are always exactly the same width: with auto
     layout a long value on one side widens that column and the two sides stop
     lining up, which defeats the point of a side-by-side diff. */
  #compareTable { table-layout: fixed; }
  #compareTable th:nth-child(1) { width: 22%; }
  #compareTable th:nth-child(2),
  #compareTable th:nth-child(3) { width: 30%; }
  #compareTable th:nth-child(4) { width: 18%; }
  #compareTable td { word-break: break-all; }

  #compareTable tbody td:first-child { box-shadow: inset 3px 0 0 transparent; }
  #compareTable tbody tr.row-diff  td:first-child { box-shadow: inset 3px 0 0 var(--warning); }
  #compareTable tbody tr.row-onlyA td:first-child { box-shadow: inset 3px 0 0 var(--critical); }
  #compareTable tbody tr.row-onlyB td:first-child { box-shadow: inset 3px 0 0 var(--series-1); }

  footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 32px;
  }
  footer a { color: inherit; }

  [hidden] { display: none !important; }

  @media (max-width: 560px) {
    .app { padding: 16px 12px 48px; }

    /* Let the brand take the full width and drop the controls onto their own
       line, rather than squeezing the title against them. */
    header { flex-wrap: wrap; row-gap: 10px; }
    .brand { flex: 1 1 100%; }
    header h1 { font-size: 18px; }
    .header-actions { margin-left: auto; }

    .view-tabs { display: flex; width: 100%; }
    .view-tab { flex: 1; justify-content: center; padding: 10px 8px; }

    /* One input per line -- two URL fields side by side at this width leaves
       neither readable -- with the buttons sharing the row below them. */
    .input-row input[type="text"] { flex: 1 1 100%; }
    .input-row .btn { flex: 1 1 0; min-height: 40px; }

    .table-card-header { row-gap: 10px; }
    .table-actions { flex-wrap: wrap; width: 100%; }
    .table-actions .btn { flex: 1 1 auto; min-height: 40px; justify-content: center; }

    .full-url-row { flex-wrap: wrap; }
    .full-url-row input[type="text"] { flex: 1 1 160px; }

    /* Scoped to the params table: the shared rule used to hit every table, and
       the compare table's third column is B, so the diff lost a whole side. */
    #paramsTable th:nth-child(3), #paramsTable td:nth-child(3) { display: none; }

    /* The row tint and left accent already carry the outcome, so the badge can
       drop to its glyph and give the width back to A and B. */
    #compareTable .status-text { display: none; }
    #compareTable th:nth-child(1) { width: 24%; }
    #compareTable th:nth-child(2),
    #compareTable th:nth-child(3) { width: 32%; }
    #compareTable th:nth-child(4) { width: 12%; }
    #compareTable thead th, #compareTable tbody td { padding-left: 6px; padding-right: 6px; }
    .val-cell pre { font-size: 11px; padding: 5px 6px; }
  }
</style>

  function splitBaseAndQuery(raw) {

    var qIdx = s.indexOf("?");
    if (qIdx !== -1) {

  function render(entries) {
    currentEntries = entries;
    // Any re-render means the params changed, so a length warning about the
    // previously shared link no longer describes what is on screen.
    clearShareHint(shareLenHint);

    if (!entries.length) {
      results.hidden = true;
      emptyState.hidden = false;
      return;
    }
    emptyState.hidden = true;
    results.hidden = false;
    fullUrlCard.hidden = !editMode;

    var uniqueKeys = [];
    entries.forEach(function (e) {
      if (uniqueKeys.indexOf(e.key) === -1) uniqueKeys.push(e.key);
    });

    var duplicateKeyCount = uniqueKeys.filter(function (k) {
      return entries.filter(function (e) { return e.key === k; }).length > 1;
    }).length;

    var jsonCount = entries.filter(function (e) { return detectType(e.value) === "json"; }).length;

    renderStats({
      total: entries.length,
      unique: uniqueKeys.length,
      duplicates: duplicateKeyCount,
      json: jsonCount
    });

    if (editMode) {
      renderEditTable();
    } else {
      tableBody.innerHTML = buildRowsHtml(entries, 0);
    }
  }

  function renderStats(s) {
    var tiles = [
      { val: s.total, lbl: t("statTotal") },
      { val: s.unique, lbl: t("statUnique") },
      { val: s.duplicates, lbl: t("statDup") },
      { val: s.json, lbl: t("statJson") }
    ];
    statsEl.innerHTML = tiles.map(function (tile) {
      return '<div class="stat-tile"><div class="val">' + tile.val + '</div><div class="lbl">' + tile.lbl + '</div></div>';
    }).join("");
  }

  function renderValueCell(value) {
    var type = detectType(value);
    if (type === "empty") {
      return '<span class="val-empty">' + escapeHtml(t("valEmpty")) + '</span>';
    }
    if (type === "json") {
      try {
        var pretty = JSON.stringify(JSON.parse(value), null, 2);
        return '<pre>' + escapeHtml(pretty) + '</pre>';
      } catch (e) { /* fall through */ }
    }
    return escapeHtml(value);
  }

  function buildRowsHtml(entries, depth) {
    var uniqueKeys = [];
    var keyIndex = Object.create(null);
    entries.forEach(function (e) {
      if (!(e.key in keyIndex)) {
        keyIndex[e.key] = uniqueKeys.length;
        uniqueKeys.push(e.key);
      }
    });

    return entries.map(function (e) {
      var type = detectType(e.value);
      var dot = '<span class="dot" style="background:' + keyColorVar(keyIndex[e.key]) + '"></span>';
      var dup = e.total > 1
        ? '<span class="dup-badge">' + e.occurrence + '/' + e.total + '</span>'
        : '';

      var valueHtml = renderValueCell(e.value);
      var nestedQs = detectNested(e.value, depth);
      if (nestedQs) {
        var nestedEntries = parseQueryStringEntries(nestedQs);
        if (nestedEntries.length) {
          var nestedId = "nested-" + (nestedIdCounter++);
          valueHtml +=
            '<button class="nested-toggle" type="button" data-toggle-nested="' + nestedId + '">' +
              escapeHtml(t("nestedExpand").replace("{n}", nestedEntries.length)) +
            '</button>' +
            '<div class="nested-block" id="' + nestedId + '" hidden>' +
              '<table class="nested-table"><tbody>' + buildRowsHtml(nestedEntries, depth + 1) + '</tbody></table>' +
            '</div>';
        }
      }

      return (
        '<tr>' +
          '<td><div class="key-cell">' + dot + escapeHtml(e.key) + dup + '</div></td>' +
          '<td class="val-cell">' + valueHtml + '</td>' +
          '<td><span class="type-badge">' + type + '</span></td>' +
          '<td class="copy-cell"><button class="copy-btn" data-copy-value="' + escapeHtml(e.value) + '" type="button">' + escapeHtml(t("copy")) + '</button></td>' +
        '</tr>'
      );
    }).join("");
  }

  // --- editor mode: turn the table into editable rows + a live full-URL preview ---

  function renderEditTable() {
    var rowsHtml = editEntries.map(function (e, i) {
      return (
        '<tr data-row-index="' + i + '">' +
          '<td><input type="text" class="edit-input edit-key" data-field="key" value="' + escapeHtml(e.key) + '"></td>' +
          '<td><input type="text" class="edit-input edit-value" data-field="value" value="' + escapeHtml(e.value) + '"></td>' +
          '<td><span class="type-badge">' + detectType(e.value) + '</span></td>' +
          '<td class="copy-cell"><button class="copy-btn row-remove-btn" type="button" data-remove-row="' + i + '">✕</button></td>' +
        '</tr>'
      );
    }).join("");

    rowsHtml += '<tr><td class="add-row-cell" colspan="4"><button class="btn btn-ghost" type="button" id="addRowBtn">+ ' + escapeHtml(t("addParam")) + '</button></td></tr>';
    tableBody.innerHTML = rowsHtml;
  }

  function updateFullUrlPreview() {
    var cleaned = editEntries.filter(function (e) { return e.key !== ""; });
    fullUrlOutput.value = buildFullUrl(baseUrlInput.value.trim(), currentStyle, currentFragment, cleaned);
    // Editing a param invalidates any warning shown for an earlier share.
    clearShareHint(shareLenHint);
  }

  function enterEditMode() {
    if (!currentEntries.length) return;
    editMode = true;
    editEntries = currentEntries.map(function (e) { return { key: e.key, value: e.value }; });
    baseUrlInput.value = currentBase;
    fullUrlCard.hidden = false;
    editModeLabel.textContent = t("doneEditing");
    track("edit_mode_enter");
    renderEditTable();
    updateFullUrlPreview();
  }

  function exitEditMode() {
    editMode = false;
    fullUrlCard.hidden = true;
    editModeLabel.textContent = t("editParams");
    var cleaned = editEntries.filter(function (e) { return e.key !== ""; });
    currentBase = baseUrlInput.value.trim();
    urlInput.value = buildFullUrl(currentBase, currentStyle, currentFragment, cleaned);
    track("edit_mode_exit", { param_count: cleaned.length });
    render(annotateOccurrences(cleaned));
  }

  editModeBtn.addEventListener("click", function () {
    if (editMode) exitEditMode();
    else enterEditMode();
  });

  baseUrlInput.addEventListener("input", updateFullUrlPreview);

  copyFullUrlBtn.addEventListener("click", function () {
    track("copy_full_url");
    copyToClipboard(fullUrlOutput.value).then(function () { flashCopied(copyFullUrlBtn); });
  });

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (e) { /* ignore */ }
    document.body.removeChild(ta);
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(function () {
        fallbackCopy(text);
      });
    }
    fallbackCopy(text);
    return Promise.resolve();
  }

  // Buttons carrying an icon must flash only their label element: assigning
  // textContent on the button itself would wipe out the inline <svg>, and the
  // "original" captured for restore is text only, so the icon never comes back.
  function flashCopiedLabel(btn, labelEl) {
    var original = labelEl.textContent;
    labelEl.textContent = t("copied");
    btn.classList.add("copied");
    setTimeout(function () {
      labelEl.textContent = original;
      btn.classList.remove("copied");
    }, 1200);
  }

  function flashCopied(btn, label) {
    var original = btn.textContent;
    btn.textContent = label || t("copied");
    btn.classList.add("copied");
    setTimeout(function () {
      btn.textContent = original;
      btn.classList.remove("copied");
    }, 1200);
  }

  // --- share links: encode the current parse/compare state as a query
  // param on this tool's own URL, so opening the link reproduces it.
  // Where the browser supports it, the payload is gzip-compressed via the
  // native CompressionStream API (no library, no backend, no third-party
  // shortener) before being base64url-encoded into ?z=; browsers without it
  // fall back to a plain encodeURIComponent payload in ?u= / ?a=&b=. ---

  // The payload lives in the fragment, so it is never sent to the server and
  // the proxy's ~8KB request-line limit does not apply. What remains is what
  // mangles links in transit (chat clients, mail wrapping) and, far out, the
  // browser's own URL ceiling.
  var SHARE_LEN_SAFE = 2000;
  var SHARE_LEN_RISKY = 32000;
  var HAS_COMPRESSION = typeof CompressionStream !== "undefined" && typeof DecompressionStream !== "undefined";

  function classifyShareLen(n) {
    if (n <= SHARE_LEN_SAFE) return "ok";
    if (n <= SHARE_LEN_RISKY) return "warn";
    return "risk";
  }

  // Sharing copies straight to the clipboard, so the only thing left to say is
  // whether the link is long enough to be at risk in transit. A link in the
  // safe tier says nothing at all -- the button's "copied" flash is the
  // confirmation. The length is parked on the element so a language switch can
  // re-translate a visible warning without regenerating the link.
  function setShareHint(hintEl, len) {
    hintEl.classList.remove("hint-warn", "hint-risk");
    var cls = classifyShareLen(len);
    if (cls === "ok") {
      clearShareHint(hintEl);
      return;
    }
    hintEl.hidden = false;
    hintEl.setAttribute("data-len", len);
    hintEl.classList.add("hint-" + cls);
    hintEl.textContent = t(cls === "warn" ? "shareLenWarn" : "shareLenRisk").replace("{n}", len);
  }

  function clearShareHint(hintEl) {
    hintEl.hidden = true;
    hintEl.textContent = "";
    hintEl.removeAttribute("data-len");
    hintEl.classList.remove("hint-warn", "hint-risk");
  }

  // Must be captured before any re-render, because the re-render clears the
  // hint (including the length parked on it) as part of invalidating it.
  function captureShareHints() {
    return [shareLenHint.getAttribute("data-len"), compareShareLenHint.getAttribute("data-len")];
  }

  function restoreShareHints(snapshot) {
    if (snapshot[0]) setShareHint(shareLenHint, Number(snapshot[0]));
    if (snapshot[1]) setShareHint(compareShareLenHint, Number(snapshot[1]));
  }

  function getShareableUrl() {
    if (editMode) {
      var cleaned = editEntries.filter(function (e) { return e.key !== ""; });
      return buildFullUrl(baseUrlInput.value.trim(), currentStyle, currentFragment, cleaned);
    }
    return urlInput.value.trim();
  }

  function bufferToBase64Url(buf) {
    var bytes = new Uint8Array(buf);
    var bin = "";
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  function base64UrlToBuffer(str) {
    var b64 = str.replace(/-/g, "+").replace(/_/g, "/");
    while (b64.length % 4) b64 += "=";
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes.buffer;
  }

  function compressToParam(str) {
    var stream = new Blob([str]).stream().pipeThrough(new CompressionStream("gzip"));
    return new Response(stream).arrayBuffer().then(bufferToBase64Url);
  }

  // Wrapped in Promise.resolve().then so that a malformed payload — atob()
  // throws synchronously on invalid base64, e.g. a link mangled or truncated
  // in transit — surfaces as a rejection the caller's .catch can handle,
  // rather than escaping it and aborting page init.
  function decompressFromParam(param) {
    return Promise.resolve().then(function () {
      var stream = new Blob([base64UrlToBuffer(param)]).stream().pipeThrough(new DecompressionStream("gzip"));
      return new Response(stream).text();
    });
  }

  // Share state rides in the fragment, never the query string, for two
  // reasons: the query string is already taken by the documented "paste your
  // params straight onto this tool's URL" convention (so a ?z= / ?u= / ?a=
  // share key would hijack anyone analysing a URL that happens to use those
  // very common short names), and a fragment is never sent to the server, so
  // a long payload cannot trip the proxy's request-line limit.
  var SHARE_HASH_RE = /^#(s|p)=/;

  // Deliberately the default-language URL rather than the current one: a share
  // link should render in the recipient's language (their stored pick, else
  // their browser's), and only a link without a language segment leaves that
  // decision to the auto-selection in <head>. The payload rides in the
  // fragment, which survives the hop.
  var SHARE_BASE = CANONICALS[DEFAULT_LANG];

  function buildPlainShareLink(payload) {
    return SHARE_BASE + "#p=" + encodeURIComponent(JSON.stringify(payload));
  }

  function finalizeShare(link, hintEl, btn, labelEl, view, compressed) {
    setShareHint(hintEl, link.length);
    track("share_link_generate", { view: view, len: link.length, compressed: !!compressed });
    copyToClipboard(link).then(function () { flashCopiedLabel(btn, labelEl); });
  }

  // Compression is a win on repetitive params but a loss on high-entropy ones
  // (tokens, JWTs, hashes): gzip cannot shrink them and base64url then adds
  // ~33%, making #s= longer than plain #p=. So build both and keep whichever
  // is actually shorter -- the link is never worse than the uncompressed form.
  function makeShareLink(payload, hintEl, btn, labelEl, view) {
    var plain = buildPlainShareLink(payload);
    if (!HAS_COMPRESSION) {
      finalizeShare(plain, hintEl, btn, labelEl, view, false);
      return;
    }
    compressToParam(JSON.stringify(payload)).then(function (z) {
      var compressed = SHARE_BASE + "#s=" + z;
      var win = compressed.length < plain.length;
      finalizeShare(win ? compressed : plain, hintEl, btn, labelEl, view, win);
    }).catch(function () {
      finalizeShare(plain, hintEl, btn, labelEl, view, false);
    });
  }

  shareBtn.addEventListener("click", function () {
    var target = getShareableUrl();
    if (!target) return;
    makeShareLink({ t: "u", v: target }, shareLenHint, shareBtn, shareBtnLabel, "parse");
  });

  compareShareBtn.addEventListener("click", function () {
    var a = compareInputA.value.trim();
    var b = compareInputB.value.trim();
    if (!a && !b) return;
    makeShareLink({ t: "c", a: a, b: b }, compareShareLenHint, compareShareBtn, compareShareBtnLabel, "compare");
  });

  tableBody.addEventListener("click", function (ev) {
    var copyBtn = ev.target.closest("[data-copy-value]");
    if (copyBtn) {
      track("copy_value");
      copyToClipboard(copyBtn.getAttribute("data-copy-value")).then(function () { flashCopied(copyBtn); });
      return;
    }

    var toggleBtn = ev.target.closest("[data-toggle-nested]");
    if (toggleBtn) {
      var block = document.getElementById(toggleBtn.getAttribute("data-toggle-nested"));
      if (!block) return;
      var willShow = block.hidden;
      block.hidden = !willShow;
      if (willShow) {
        track("expand_nested");
        toggleBtn.textContent = t("nestedCollapse");
      } else {
        var n = block.querySelectorAll(":scope > table > tbody > tr").length;
        toggleBtn.textContent = t("nestedExpand").replace("{n}", n);
      }
      return;
    }

    var removeBtn = ev.target.closest("[data-remove-row]");
    if (removeBtn) {
      var idx = Number(removeBtn.getAttribute("data-remove-row"));
      editEntries.splice(idx, 1);
      track("edit_remove_param");
      renderEditTable();
      updateFullUrlPreview();
      return;
    }

    if (ev.target.closest("#addRowBtn")) {
      editEntries.push({ key: "", value: "" });
      track("edit_add_param");
      renderEditTable();
      var rows = tableBody.querySelectorAll("tr[data-row-index]");
      var last = rows[rows.length - 1];
      if (last) last.querySelector(".edit-key").focus();
    }
  });

  tableBody.addEventListener("input", function (ev) {
    var input = ev.target.closest(".edit-input");
    if (!input) return;
    var tr = input.closest("tr[data-row-index]");
    if (!tr) return;
    var idx = Number(tr.getAttribute("data-row-index"));
    var field = input.getAttribute("data-field");
    if (editEntries[idx]) {
      editEntries[idx][field] = input.value;
      updateFullUrlPreview();
    }
  });

  copyUrlBtn.addEventListener("click", function () {
    track("copy_full_url_quick");
    var entries = editMode ? editEntries.filter(function (e) { return e.key !== ""; }) : currentEntries;
    var base = editMode ? baseUrlInput.value.trim() : currentBase;
    var url = buildFullUrl(base, currentStyle, currentFragment, entries);
    copyToClipboard(url).then(function () { flashCopied(copyUrlBtn, t("copied")); });
  });

  copyJsonBtn.addEventListener("click", function () {
    track("copy_json");
    var obj = {};
    currentEntries.forEach(function (e) {
      if (e.key in obj) {
        if (!Array.isArray(obj[e.key])) obj[e.key] = [obj[e.key]];
        obj[e.key].push(e.value);
      } else {
        obj[e.key] = e.value;
      }
    });
    copyToClipboard(JSON.stringify(obj, null, 2)).then(function () {
      flashCopied(copyJsonBtn, t("copiedJson"));
    });
  });

  function doParse() {
    editMode = false;
    resetShareError();
    editModeLabel.textContent = t("editParams");
    var parts = splitBaseAndQuery(urlInput.value);
    currentBase = parts.base;
    currentStyle = parts.style;
    currentFragment = parts.fragment;
    var entries = parseQueryStringEntries(parts.query);
    track("parse_url", { param_count: entries.length });
    render(entries);
  }

  parseBtn.addEventListener("click", doParse);
  urlInput.addEventListener("keydown", function (ev) {
    if (ev.key === "Enter") doParse();
  });
  exampleBtn.addEventListener("click", function () {
    urlInput.value = EXAMPLE_URL;
    track("load_example");
    doParse();
  });
  clearBtn.addEventListener("click", function () {
    urlInput.value = "";
    track("clear");
    resetShareError();
    render([]);
    urlInput.focus();
  });

  // --- compare mode: diff the query params of two URLs ---

  function groupByKey(entries) {
    var map = Object.create(null);
    entries.forEach(function (e) {
      if (!map[e.key]) map[e.key] = [];
      map[e.key].push(e.value);
    });
    return map;
  }

  function buildDiffRows(entriesA, entriesB) {
    var mapA = groupByKey(entriesA);
    var mapB = groupByKey(entriesB);
    var keys = [];
    entriesA.concat(entriesB).forEach(function (e) {
      if (keys.indexOf(e.key) === -1) keys.push(e.key);
    });

    return keys.map(function (key) {
      var valuesA = mapA[key] || [];
      var valuesB = mapB[key] || [];
      var status;
      if (valuesA.length && !valuesB.length) status = "onlyA";
      else if (valuesB.length && !valuesA.length) status = "onlyB";
      else if (JSON.stringify(valuesA.slice().sort()) === JSON.stringify(valuesB.slice().sort())) status = "same";
      else status = "diff";
      return { key: key, valuesA: valuesA, valuesB: valuesB, status: status };
    });
  }

  function renderValueList(values) {
    if (!values.length) return '<span class="val-empty">—</span>';
    return values.map(renderValueCell).join("<br>");
  }

  function renderCompare() {
    // Same reasoning as render(): a new diff invalidates the old warning.
    clearShareHint(compareShareLenHint);

    var entriesA = parseEntries(compareInputA.value);
    var entriesB = parseEntries(compareInputB.value);
    var rows = buildDiffRows(entriesA, entriesB);

    var statusMeta = {
      same:  { icon: "✓", cls: "status-same",  row: "",           label: t("statusSame") },
      diff:  { icon: "≠", cls: "status-diff",  row: "row-diff",   label: t("statusDiff") },
      onlyA: { icon: "A", cls: "status-onlyA", row: "row-onlyA",  label: t("statusOnlyA") },
      onlyB: { icon: "B", cls: "status-onlyB", row: "row-onlyB",  label: t("statusOnlyB") }
    };

    compareTableBody.innerHTML = rows.map(function (r) {
      var meta = statusMeta[r.status];
      return (
        '<tr class="' + meta.row + '">' +
          '<td class="key-cell">' + escapeHtml(r.key) + '</td>' +
          '<td class="val-cell">' + renderValueList(r.valuesA) + '</td>' +
          '<td class="val-cell">' + renderValueList(r.valuesB) + '</td>' +
          '<td><span class="status-badge ' + meta.cls + '">' + meta.icon + '<span class="status-text">' + escapeHtml(meta.label) + '</span></span></td>' +
        '</tr>'
      );
    }).join("");

    compareResultCard.hidden = rows.length === 0;
  }

  function switchView(view) {
    parseView.hidden = view !== "parse";
    compareView.hidden = view !== "compare";
    tabParseBtn.setAttribute("aria-selected", String(view === "parse"));
    tabCompareBtn.setAttribute("aria-selected", String(view === "compare"));
    track("view_switch", { view: view });
  }

  tabParseBtn.addEventListener("click", function () { switchView("parse"); });
  tabCompareBtn.addEventListener("click", function () { switchView("compare"); });

  compareBtn.addEventListener("click", function () {
    track("compare_run");
    renderCompare();
  });
  compareInputA.addEventListener("keydown", function (ev) { if (ev.key === "Enter") { track("compare_run"); renderCompare(); } });
  compareInputB.addEventListener("keydown", function (ev) { if (ev.key === "Enter") { track("compare_run"); renderCompare(); } });

  // theme toggle
  // Three states rather than two, so "follow the system" stays reachable: the
  // auto state removes data-theme entirely and lets the prefers-color-scheme
  // media query drive, which also means the page keeps tracking the system
  // live if it changes while open. Only an explicit light/dark choice is
  // persisted; auto is represented by the absence of a stored value.
  var THEME_KEY = "qpv-theme";
  var THEME_CYCLE = ["auto", "light", "dark"];
  var THEME_ICON = { auto: "#i-contrast", light: "#i-sun", dark: "#i-moon" };
  var THEME_LABEL = { auto: "themeAuto", light: "themeLight", dark: "themeDark" };
  var currentTheme = "auto";

  function renderThemeToggle() {
    themeToggleIcon.setAttribute("href", THEME_ICON[currentTheme]);
    var label = t("themeToggleLabel") + ": " + t(THEME_LABEL[currentTheme]);
    themeToggle.title = label;
    themeToggle.setAttribute("aria-label", label);
  }

  function applyTheme(theme) {
    currentTheme = theme === "light" || theme === "dark" ? theme : "auto";
    if (currentTheme === "auto") {
      document.documentElement.removeAttribute("data-theme");
    } else {
      document.documentElement.setAttribute("data-theme", currentTheme);
    }
    renderThemeToggle();
  }

  var savedTheme = null;
  try { savedTheme = localStorage.getItem(THEME_KEY); } catch (e) { /* ignore */ }
  applyTheme(savedTheme);

  themeToggle.addEventListener("click", function () {
    var next = THEME_CYCLE[(THEME_CYCLE.indexOf(currentTheme) + 1) % THEME_CYCLE.length];
    applyTheme(next);
    track("theme_toggle", { theme: next });
    try {
      if (next === "auto") localStorage.removeItem(THEME_KEY);
      else localStorage.setItem(THEME_KEY, next);
    } catch (e) { /* ignore */ }
  });

  // language switch: progressive enhancement over the plain <a href> links —
  // swap all page text client-side (no reload, keeps input/parsed state) and
  // sync the URL bar via pushState; without JS the links still navigate to
  // the real static per-language page.
  function setMeta(selector, attr, value) {
    var el = document.querySelector(selector);
    if (el) el.setAttribute(attr, value);
  }

  function applyLangToDom(lang) {
    if (!I18N_ALL[lang] || lang === currentLang) return;
    currentLang = lang;
    var dict = I18N_ALL[lang];

    document.documentElement.lang = dict.htmlLang;
    document.title = dict.title;

    setMeta('meta[name="description"]', "content", dict.description);
    setMeta('meta[name="keywords"]', "content", dict.keywords);
    setMeta('meta[property="og:title"]', "content", dict.title);
    setMeta('meta[property="og:description"]', "content", dict.ogDescription);
    setMeta('meta[property="og:url"]', "content", CANONICALS[lang]);
    setMeta('meta[property="og:locale"]', "content", dict.ogLocale);
    setMeta('meta[name="twitter:title"]', "content", dict.title);
    setMeta('meta[name="twitter:description"]', "content", dict.ogDescription);
    setMeta('link[rel="canonical"]', "href", CANONICALS[lang]);

    taglineEl.textContent = dict.tagline;
    urlInput.placeholder = dict.inputPlaceholder;
    parseBtn.textContent = dict.btnParse;
    exampleBtn.textContent = dict.btnExample;
    clearBtn.textContent = dict.btnClear;
    hintEl.innerHTML = dict.hintHtml;
    emptyTextEl.textContent = shareErrorKey ? dict[shareErrorKey] : dict.emptyText;
    tableTitleEl.textContent = dict.tableTitle;
    copyJsonBtn.textContent = dict.copyJsonBtn;
    copyUrlBtn.textContent = dict.copyUrlBtn;
    footerEl.textContent = dict.footer;
    renderThemeToggle();

    editModeLabel.textContent = editMode ? dict.doneEditing : dict.editParams;
    fullUrlHeadingEl.textContent = dict.fullUrlHeading;
    baseUrlLabelEl.textContent = dict.baseUrlLabel;
    fullUrlPreviewLabelEl.textContent = dict.fullUrlPreviewLabel;
    baseUrlInput.placeholder = dict.baseUrlPlaceholder;
    copyFullUrlBtn.textContent = dict.copy;

    tabParseLabel.textContent = dict.tabParse;
    tabCompareLabel.textContent = dict.tabCompare;
    compareHeadingEl.textContent = dict.compareHeading;
    compareBtn.textContent = dict.compareBtn;

    shareBtnLabel.textContent = dict.shareBtn;
    compareShareBtnLabel.textContent = dict.shareBtn;

    refreshLangHrefs(lang);

    var shareHintSnapshot = captureShareHints();

    if (editMode) {
      renderEditTable();
      updateFullUrlPreview();
    } else if (currentEntries.length) {
      render(currentEntries);
    }
    if (!compareResultCard.hidden) renderCompare();

    // The re-renders above clear any visible length warning; restore it in the
    // new language. The link itself was already copied, so nothing to rebuild.
    restoreShareHints(shareHintSnapshot);
  }

  // Root-relative (not "../"-chained) hrefs: BASE_PATH is resolved once by
  // stripping any language segment from the current path, so repeated
  // client-side switches always target base+lang directly instead of
  // compounding onto whatever path pushState last landed on.
  var LANG_DIR = __LANG_DIRS_JSON__;
  var LANG_NAMES = __LANG_NAMES_JSON__;

  // The directory names of every non-default language ("zh|zh-hant|ja|..."),
  // which is what a path may end in. Longest first so that "zh-hant" is not
  // half-matched by "zh" — alternation would backtrack into the right answer
  // here, but only because of what follows it, which is too subtle to lean on.
  var LANG_SEGMENTS = Object.keys(LANG_DIR)
    .filter(function (lang) { return LANG_DIR[lang]; })
    .map(function (lang) { return LANG_DIR[lang].replace("/", ""); })
    .sort(function (a, b) { return b.length - a.length; })
    .join("|");

  function detectLangFromPath() {
    var m = new RegExp("/(" + LANG_SEGMENTS + ")/?(?:index\\.html)?$").exec(window.location.pathname);
    return m ? m[1] : DEFAULT_LANG;
  }

  // Drops a trailing index.html first (the file:// and "serve the file
  // directly" cases), then strips whole language segments — anchored on a
  // leading slash so an unrelated path segment that merely ends in those
  // letters (/zen/, /ninja/) survives intact.
  function computeBasePath() {
    var langSegment = new RegExp("/(?:" + LANG_SEGMENTS + ")/?$");
    var stripped = window.location.pathname.replace(/index\.html$/, "");
    var prev;
    do {
      prev = stripped;
      stripped = stripped.replace(langSegment, "/");
    } while (stripped !== prev);
    if (stripped.slice(-1) !== "/") stripped += "/";
    return stripped;
  }

  var BASE_PATH = computeBasePath();

  function langHref(lang) {
    // Carries the query string and the fragment along (the fragment is where
    // a share payload lives) so switching language mid-share keeps the state.
    return BASE_PATH + LANG_DIR[lang] + window.location.search + window.location.hash;
  }

  function refreshLangHrefs(lang) {
    langCurrentLabel.textContent = LANG_NAMES[lang];
    langMenuSummary.title = I18N_ALL[lang].langMenuLabel;
    langMenuSummary.setAttribute("aria-label", I18N_ALL[lang].langMenuLabel);
    document.querySelectorAll(".lang-switch a").forEach(function (a) {
      var linkLang = a.getAttribute("data-lang");
      if (linkLang) a.setAttribute("href", langHref(linkLang));
      if (linkLang === lang) a.setAttribute("aria-current", "true");
      else a.removeAttribute("aria-current");
    });
  }

  refreshLangHrefs(currentLang);

  document.querySelectorAll(".lang-switch a").forEach(function (a) {
    a.addEventListener("click", function (ev) {
      var lang = a.getAttribute("data-lang");
      // Picking a language always dismisses the menu, including the no-op
      // click on the current one — otherwise it stays open over the page.
      langMenu.open = false;
      if (!lang) { ev.preventDefault(); return; }
      // Remembered so the auto-selection in <head> defers to it on the next
      // visit to the root URL. Worth storing even for the no-op click: it
      // pins the language the visitor is already reading.
      try { localStorage.setItem("qpv-lang", lang); } catch (e) { /* ignore */ }
      if (lang === currentLang) { ev.preventDefault(); return; }
      ev.preventDefault();
      track("lang_switch", { lang: lang });
      var href = langHref(lang);
      applyLangToDom(lang);
      history.pushState({ lang: lang }, "", href);
    });
  });

  // <details> closes on its own summary but not on anything else, so give the
  // menu the dismissal behaviour people expect from a dropdown.
  document.addEventListener("click", function (ev) {
    if (langMenu.open && !langMenu.contains(ev.target)) langMenu.open = false;
  });
  document.addEventListener("keydown", function (ev) {
    if (ev.key === "Escape" && langMenu.open) {
      langMenu.open = false;
      langMenuSummary.focus();
    }
  });

  window.addEventListener("popstate", function (ev) {
    applyLangToDom((ev.state && ev.state.lang) || detectLangFromPath());
  });

  // Load state from an explicit share link: ?z=<gzip+base64url> (compressed
  // payload, see HAS_COMPRESSION above) or the plain ?u=... / ?a=...&b=...
  // fallback, falling back further to the legacy convention of pasting bare
  // params directly onto this tool's own URL (see README) for links shared
  // before the Share button existed.
  function applySharePayload(payload, compressed) {
    if (payload && payload.t === "c") {
      compareInputA.value = payload.a || "";
      compareInputB.value = payload.b || "";
      switchView("compare");
      renderCompare();
      track("share_link_open", { view: "compare", compressed: !!compressed });
    } else if (payload && payload.t === "u") {
      urlInput.value = payload.v || "";
      doParse();
      track("share_link_open", { view: "parse", compressed: !!compressed });
    } else {
      // Decoded cleanly but is not a payload shape we know — treat as broken
      // rather than silently showing an empty page.
      showShareError("shareLinkBroken");
      track("share_link_open_failed", { reason: "unknown_shape" });
    }
  }

  // Returns true if the page URL carries a share payload and it has been
  // handled (successfully or with an error shown). The "#s=" / "#p=" prefix
  // is matched strictly, so an ordinary hash route the user pasted in to be
  // analysed still falls through to the normal auto-load path.
  function readShareFromHash() {
    var hash = window.location.hash;
    if (!SHARE_HASH_RE.test(hash)) return false;

    var kind = hash.charAt(1);
    var raw = hash.slice(3);

    if (kind === "p") {
      try {
        applySharePayload(JSON.parse(decodeURIComponent(raw)), false);
      } catch (e) {
        showShareError("shareLinkBroken");
        track("share_link_open_failed", { reason: "corrupt" });
      }
      return true;
    }

    if (!HAS_COMPRESSION) {
      showShareError("shareUnsupported");
      track("share_link_open_failed", { reason: "unsupported" });
      return true;
    }

    decompressFromParam(raw).then(function (json) {
      applySharePayload(JSON.parse(json), true);
    }).catch(function () {
      showShareError("shareLinkBroken");
      track("share_link_open_failed", { reason: "corrupt" });
    });
    return true;
  }

  // A share link that cannot be opened replaces the empty-state copy with the
  // reason. shareErrorKey is remembered so a language switch re-translates the
  // message instead of reverting it to the generic empty-state text.
  function showShareError(key) {
    shareErrorKey = key;
    render([]);
    emptyTextEl.textContent = t(key);
    emptyTextEl.classList.add("hint-risk");
  }

  function resetShareError() {
    if (!shareErrorKey) return;
    shareErrorKey = null;
    emptyTextEl.textContent = t("emptyText");
    emptyTextEl.classList.remove("hint-risk");
  }

  function fallbackAutoLoad() {
    var selfHref = window.location.href;
    var selfQs = extractQueryString(selfHref);
    if (selfQs) {
      urlInput.value = selfHref;
      doParse();
    } else {
      render([]);
    }
  }

  if (!readShareFromHash()) fallbackAutoLoad();
})();
</script>
</body>
</html>
