          <input type="text" id="fullUrlOutput" readonly>
          <button class="btn btn-ghost" id="copyFullUrlBtn" type="button">__COPY__</button>
        </div>
      </section>

      <section class="card">
        <div class="table-card-header">
          <h2 class="section-title" id="tableTitleText" style="margin:0;">__TABLE_TITLE__</h2>
          <div class="table-actions">
            <button class="btn btn-ghost" id="editModeBtn" type="button">__EDIT_PARAMS__</button>
            <button class="btn btn-ghost" id="copyJsonBtn" type="button">__COPY_JSON_BTN__</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Key</th>
                <th>Value</th>
                <th>Type</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <footer id="footerText">
    __FOOTER__
  </footer>
</div>

<script>
(function () {
  "use strict";

  var CAT_SLOTS = 8;
  var MAX_NEST_DEPTH = 3;
  var nestedIdCounter = 0;

  function track(name, params) {
    if (typeof gtag === "function") gtag("event", name, params || {});
  }

  var I18N_ALL = __I18N_ALL_JSON__;
  var CANONICALS = __CANONICALS_JSON__;
  var currentLang = __LANG__;

  function t(key) {
    return I18N_ALL[currentLang][key];
  }

  var urlInput = document.getElementById("urlInput");
  var parseBtn = document.getElementById("parseBtn");
  var exampleBtn = document.getElementById("exampleBtn");
  var clearBtn = document.getElementById("clearBtn");
  var emptyState = document.getElementById("empty-state");
  var emptyTextEl = document.getElementById("emptyText");
  var taglineEl = document.getElementById("tagline");
  var hintEl = document.getElementById("hintText");
  var tableTitleEl = document.getElementById("tableTitleText");
  var footerEl = document.getElementById("footerText");
  var results = document.getElementById("results");
  var statsEl = document.getElementById("stats");
  var tableBody = document.getElementById("tableBody");
  var copyJsonBtn = document.getElementById("copyJsonBtn");
  var themeToggle = document.getElementById("themeToggle");
  var editModeBtn = document.getElementById("editModeBtn");
  var fullUrlCard = document.getElementById("fullUrlCard");
  var fullUrlHeadingEl = document.getElementById("fullUrlHeadingText");
  var baseUrlInput = document.getElementById("baseUrlInput");
  var fullUrlOutput = document.getElementById("fullUrlOutput");
  var copyFullUrlBtn = document.getElementById("copyFullUrlBtn");
  var compareToggleBtn = document.getElementById("compareToggleBtn");
  var compareCard = document.getElementById("compareCard");
  var compareHeadingEl = document.getElementById("compareHeadingText");
  var compareInputA = document.getElementById("compareInputA");
  var compareInputB = document.getElementById("compareInputB");
  var compareBtn = document.getElementById("compareBtn");
  var compareTable = document.getElementById("compareTable");
  var compareTableBody = document.getElementById("compareTableBody");

  var EXAMPLE_URL = 'https://example.com/search?q=claude+code&category=dev&tags=ai&tags=cli&page=2&sort=desc&debug=true&user={"id":123,"name":"Ada"}&empty=&redirect=https%3A%2F%2Fapp.example.com%2Fcallback%3Ftoken%3Dabc123%26next%3D%2Fdashboard&filter=status%3Dactive%26owner%3Dme';

  var currentEntries = [];
  var currentBase = "";
  var currentStyle = "none";
  var currentFragment = "";

  var editMode = false;
  var editEntries = [];

  // Splits a full URL / hash route / bare query string into its base and
  // query parts, mirroring the three input shapes this tool accepts, so the
  // parts can be re-joined later (editor mode) without losing the original
  // shape.
  function splitBaseAndQuery(raw) {
    var s = raw.trim();
    if (!s) return { base: "", query: "", fragment: "", style: "none" };

    var hashIdx = s.indexOf("#");
    if (hashIdx !== -1) {
      var hashPart = s.slice(hashIdx + 1);
      var hQ = hashPart.indexOf("?");
      if (hQ !== -1) {
        return {
          base: s.slice(0, hashIdx + 1) + hashPart.slice(0, hQ),
          query: hashPart.slice(hQ + 1),
          fragment: "",
          style: "hash"
        };
      }
    }

    var qIdx = s.indexOf("?");
    if (qIdx !== -1) {
      var afterQ = s.slice(qIdx + 1);
      var hIdx2 = afterQ.indexOf("#");
      return {
        base: s.slice(0, qIdx),
        query: hIdx2 !== -1 ? afterQ.slice(0, hIdx2) : afterQ,
        fragment: hIdx2 !== -1 ? afterQ.slice(hIdx2) : "",
        style: "query"
      };
    }

    if (s.indexOf("=") !== -1) {
      return { base: "", query: s, fragment: "", style: "bare" };
    }

    return { base: s, query: "", fragment: "", style: "none" };
  }

  function extractQueryString(raw) {
    return splitBaseAndQuery(raw).query;
  }

  function annotateOccurrences(entries) {
    var counts = Object.create(null);
    entries.forEach(function (e) { counts[e.key] = (counts[e.key] || 0) + 1; });
    var running = Object.create(null);
    entries.forEach(function (e) {
      running[e.key] = (running[e.key] || 0) + 1;
      e.occurrence = running[e.key];
      e.total = counts[e.key];
    });
    return entries;
  }

  function parseQueryStringEntries(qs) {
    if (!qs) return [];
    var params = new URLSearchParams(qs);
    var entries = [];
    params.forEach(function (value, key) {
      entries.push({ key: key, value: value });
    });
    return annotateOccurrences(entries);
  }

  function parseEntries(raw) {
    return parseQueryStringEntries(extractQueryString(raw));
  }

  function buildFullUrl(base, style, fragment, entries) {
    var params = new URLSearchParams();
    entries.forEach(function (e) { params.append(e.key, e.value); });
    var qs = params.toString();
    if (!base && style === "bare") return qs;
    if (!qs) return base + fragment;
    return base + "?" + qs + fragment;
  }

  function detectType(value) {
    if (value === "") return "empty";
    if (value === "true" || value === "false") return "boolean";
    if (/^-?\d+(\.\d+)?$/.test(value)) return "number";
    try {
      var parsed = JSON.parse(value);
      if (parsed !== null && typeof parsed === "object") return "json";
    } catch (e) { /* not json */ }
    return "string";
  }

  function isQueryStringLike(qs) {
    if (!qs) return false;
    var pairs = qs.split("&");
    return pairs.length > 0 && pairs.every(function (p) {
      var eq = p.indexOf("=");
      if (eq <= 0) return false;
      return /^[A-Za-z0-9_.[\]-]+$/.test(p.slice(0, eq));
    });
  }

  // Detects a value that is itself a URL (with its own "?a=b&c=d") or a bare
  // "a=1&b=2" query string, so it can be parsed and shown as a nested table.
  function detectNested(value, depth) {
    if (depth >= MAX_NEST_DEPTH || !value) return null;

    var candidate = value;
    try {
      var decodedOnce = decodeURIComponent(value);
      if (decodedOnce !== value) candidate = decodedOnce;
    } catch (e) { /* leave as-is on invalid escape sequences */ }

    var qIdx = candidate.indexOf("?");
    if (qIdx !== -1 && /^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(candidate)) {
      var qs = candidate.slice(qIdx + 1).split("#")[0];
      if (isQueryStringLike(qs)) return qs;
    }

    if (candidate.indexOf("&") !== -1 && isQueryStringLike(candidate)) {
      return candidate;
    }

    return null;
  }

  function keyColorVar(index) {
    return index < CAT_SLOTS ? "var(--cat-" + (index + 1) + ")" : "var(--text-muted)";
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function render(entries) {
    currentEntries = entries;

    if (!entries.length) {
      results.hidden = true;
      emptyState.hidden = false;
      return;
    }
    emptyState.hidden = true;
    results.hidden = false;
    fullUrlCard.hidden = !editMode;

    var uniqueKeys = [];
    entries.forEach(function (e) {
      if (uniqueKeys.indexOf(e.key) === -1) uniqueKeys.push(e.key);
    });

    var duplicateKeyCount = uniqueKeys.filter(function (k) {
      return entries.filter(function (e) { return e.key === k; }).length > 1;
    }).length;

    var jsonCount = entries.filter(function (e) { return detectType(e.value) === "json"; }).length;

    renderStats({
      total: entries.length,
      unique: uniqueKeys.length,
      duplicates: duplicateKeyCount,
      json: jsonCount
    });

    if (editMode) {
      renderEditTable();
    } else {
      tableBody.innerHTML = buildRowsHtml(entries, 0);
    }
  }

  function renderStats(s) {
    var tiles = [
      { val: s.total, lbl: t("statTotal") },
      { val: s.unique, lbl: t("statUnique") },
      { val: s.duplicates, lbl: t("statDup") },
      { val: s.json, lbl: t("statJson") }
    ];
    statsEl.innerHTML = tiles.map(function (tile) {
      return '<div class="stat-tile"><div class="val">' + tile.val + '</div><div class="lbl">' + tile.lbl + '</div></div>';
    }).join("");
  }

  function renderValueCell(value) {
    var type = detectType(value);
    if (type === "empty") {
      return '<span class="val-empty">' + escapeHtml(t("valEmpty")) + '</span>';
    }
    if (type === "json") {
      try {
        var pretty = JSON.stringify(JSON.parse(value), null, 2);
        return '<pre>' + escapeHtml(pretty) + '</pre>';
      } catch (e) { /* fall through */ }
    }
    return escapeHtml(value);
  }

  function buildRowsHtml(entries, depth) {
    var uniqueKeys = [];
    var keyIndex = Object.create(null);
    entries.forEach(function (e) {
      if (!(e.key in keyIndex)) {
        keyIndex[e.key] = uniqueKeys.length;
        uniqueKeys.push(e.key);
      }
    });

    return entries.map(function (e) {
      var type = detectType(e.value);
      var dot = '<span class="dot" style="background:' + keyColorVar(keyIndex[e.key]) + '"></span>';
      var dup = e.total > 1
        ? '<span class="dup-badge">' + e.occurrence + '/' + e.total + '</span>'
        : '';

      var valueHtml = renderValueCell(e.value);
      var nestedQs = detectNested(e.value, depth);
      if (nestedQs) {
        var nestedEntries = parseQueryStringEntries(nestedQs);
        if (nestedEntries.length) {
          var nestedId = "nested-" + (nestedIdCounter++);
          valueHtml +=
            '<button class="nested-toggle" type="button" data-toggle-nested="' + nestedId + '">' +
              escapeHtml(t("nestedExpand").replace("{n}", nestedEntries.length)) +
            '</button>' +
            '<div class="nested-block" id="' + nestedId + '" hidden>' +
              '<table class="nested-table"><tbody>' + buildRowsHtml(nestedEntries, depth + 1) + '</tbody></table>' +
            '</div>';
        }
      }

      return (
        '<tr>' +
          '<td><div class="key-cell">' + dot + escapeHtml(e.key) + dup + '</div></td>' +
          '<td class="val-cell">' + valueHtml + '</td>' +
          '<td><span class="type-badge">' + type + '</span></td>' +
          '<td class="copy-cell"><button class="copy-btn" data-copy-value="' + escapeHtml(e.value) + '" type="button">' + escapeHtml(t("copy")) + '</button></td>' +
        '</tr>'
      );
    }).join("");
  }

  // --- editor mode: turn the table into editable rows + a live full-URL preview ---

  function renderEditTable() {
    var rowsHtml = editEntries.map(function (e, i) {
      return (
        '<tr data-row-index="' + i + '">' +
          '<td><input type="text" class="edit-input edit-key" data-field="key" value="' + escapeHtml(e.key) + '"></td>' +
          '<td><input type="text" class="edit-input edit-value" data-field="value" value="' + escapeHtml(e.value) + '"></td>' +
          '<td><span class="type-badge">' + detectType(e.value) + '</span></td>' +
          '<td class="copy-cell"><button class="copy-btn row-remove-btn" type="button" data-remove-row="' + i + '">✕</button></td>' +
        '</tr>'
      );
    }).join("");

    rowsHtml += '<tr><td class="add-row-cell" colspan="4"><button class="btn btn-ghost" type="button" id="addRowBtn">+ ' + escapeHtml(t("addParam")) + '</button></td></tr>';
    tableBody.innerHTML = rowsHtml;
  }

  function updateFullUrlPreview() {
    var cleaned = editEntries.filter(function (e) { return e.key !== ""; });
    fullUrlOutput.value = buildFullUrl(baseUrlInput.value.trim(), currentStyle, currentFragment, cleaned);
  }

  function enterEditMode() {
    if (!currentEntries.length) return;
    editMode = true;
    editEntries = currentEntries.map(function (e) { return { key: e.key, value: e.value }; });
    baseUrlInput.value = currentBase;
    fullUrlCard.hidden = false;
    editModeBtn.textContent = t("doneEditing");
    track("edit_mode_enter");
    renderEditTable();
    updateFullUrlPreview();
  }

  function exitEditMode() {
    editMode = false;
    fullUrlCard.hidden = true;
    editModeBtn.textContent = t("editParams");
    var cleaned = editEntries.filter(function (e) { return e.key !== ""; });
    currentBase = baseUrlInput.value.trim();
    urlInput.value = buildFullUrl(currentBase, currentStyle, currentFragment, cleaned);
    track("edit_mode_exit", { param_count: cleaned.length });
    render(annotateOccurrences(cleaned));
  }

  editModeBtn.addEventListener("click", function () {
    if (editMode) exitEditMode();
    else enterEditMode();
  });

  baseUrlInput.addEventListener("input", updateFullUrlPreview);

  copyFullUrlBtn.addEventListener("click", function () {
    track("copy_full_url");
    copyToClipboard(fullUrlOutput.value).then(function () { flashCopied(copyFullUrlBtn); });
  });

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (e) { /* ignore */ }
    document.body.removeChild(ta);
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(function () {
        fallbackCopy(text);
      });
    }
    fallbackCopy(text);
    return Promise.resolve();
  }

  function flashCopied(btn, label) {
    var original = btn.textContent;
    btn.textContent = label || t("copied");
    btn.classList.add("copied");
    setTimeout(function () {
      btn.textContent = original;
      btn.classList.remove("copied");
    }, 1200);
  }

  tableBody.addEventListener("click", function (ev) {
    var copyBtn = ev.target.closest("[data-copy-value]");
    if (copyBtn) {
      track("copy_value");
      copyToClipboard(copyBtn.getAttribute("data-copy-value")).then(function () { flashCopied(copyBtn); });
      return;
    }

    var toggleBtn = ev.target.closest("[data-toggle-nested]");
    if (toggleBtn) {
      var block = document.getElementById(toggleBtn.getAttribute("data-toggle-nested"));
      if (!block) return;
      var willShow = block.hidden;
      block.hidden = !willShow;
      if (willShow) {
        track("expand_nested");
        toggleBtn.textContent = t("nestedCollapse");
      } else {
        var n = block.querySelectorAll(":scope > table > tbody > tr").length;
        toggleBtn.textContent = t("nestedExpand").replace("{n}", n);
      }
      return;
    }

    var removeBtn = ev.target.closest("[data-remove-row]");
    if (removeBtn) {
      var idx = Number(removeBtn.getAttribute("data-remove-row"));
      editEntries.splice(idx, 1);
      track("edit_remove_param");
      renderEditTable();
      updateFullUrlPreview();
      return;
    }

    if (ev.target.closest("#addRowBtn")) {
      editEntries.push({ key: "", value: "" });
      track("edit_add_param");
      renderEditTable();
      var rows = tableBody.querySelectorAll("tr[data-row-index]");
      var last = rows[rows.length - 1];
      if (last) last.querySelector(".edit-key").focus();
    }
  });

  tableBody.addEventListener("input", function (ev) {
    var input = ev.target.closest(".edit-input");
    if (!input) return;
    var tr = input.closest("tr[data-row-index]");
    if (!tr) return;
    var idx = Number(tr.getAttribute("data-row-index"));
    var field = input.getAttribute("data-field");
    if (editEntries[idx]) {
      editEntries[idx][field] = input.value;
      updateFullUrlPreview();
    }
  });

  copyJsonBtn.addEventListener("click", function () {
    track("copy_json");
    var obj = {};
    currentEntries.forEach(function (e) {
      if (e.key in obj) {
        if (!Array.isArray(obj[e.key])) obj[e.key] = [obj[e.key]];
        obj[e.key].push(e.value);
      } else {
        obj[e.key] = e.value;
      }
    });
    copyToClipboard(JSON.stringify(obj, null, 2)).then(function () {
      flashCopied(copyJsonBtn, t("copiedJson"));
    });
  });

  function doParse() {
    editMode = false;
    editModeBtn.textContent = t("editParams");
    var parts = splitBaseAndQuery(urlInput.value);
    currentBase = parts.base;
    currentStyle = parts.style;
    currentFragment = parts.fragment;
    var entries = parseQueryStringEntries(parts.query);
    track("parse_url", { param_count: entries.length });
    render(entries);
  }

  parseBtn.addEventListener("click", doParse);
  urlInput.addEventListener("keydown", function (ev) {
    if (ev.key === "Enter") doParse();
  });
  exampleBtn.addEventListener("click", function () {
    urlInput.value = EXAMPLE_URL;
    track("load_example");
    doParse();
  });
  clearBtn.addEventListener("click", function () {
    urlInput.value = "";
    track("clear");
    render([]);
    urlInput.focus();
  });

  // --- compare mode: diff the query params of two URLs ---

  function groupByKey(entries) {
    var map = Object.create(null);
    entries.forEach(function (e) {
      if (!map[e.key]) map[e.key] = [];
      map[e.key].push(e.value);
    });
    return map;
  }

  function buildDiffRows(entriesA, entriesB) {
    var mapA = groupByKey(entriesA);
    var mapB = groupByKey(entriesB);
    var keys = [];
    entriesA.concat(entriesB).forEach(function (e) {
      if (keys.indexOf(e.key) === -1) keys.push(e.key);
    });

    return keys.map(function (key) {
      var valuesA = mapA[key] || [];
      var valuesB = mapB[key] || [];
      var status;
      if (valuesA.length && !valuesB.length) status = "onlyA";
      else if (valuesB.length && !valuesA.length) status = "onlyB";
      else if (JSON.stringify(valuesA.slice().sort()) === JSON.stringify(valuesB.slice().sort())) status = "same";
      else status = "diff";
      return { key: key, valuesA: valuesA, valuesB: valuesB, status: status };
    });
  }

  function renderValueList(values) {
    if (!values.length) return '<span class="val-empty">—</span>';
    return values.map(renderValueCell).join("<br>");
  }

  function renderCompare() {
    var entriesA = parseEntries(compareInputA.value);
    var entriesB = parseEntries(compareInputB.value);
    var rows = buildDiffRows(entriesA, entriesB);

    var statusMeta = {
      same:  { icon: "✓", cls: "status-same", label: t("statusSame") },
      diff:  { icon: "≠", cls: "status-diff", label: t("statusDiff") },
      onlyA: { icon: "A",      cls: "status-only", label: t("statusOnlyA") },
      onlyB: { icon: "B",      cls: "status-only", label: t("statusOnlyB") }
    };

    compareTableBody.innerHTML = rows.map(function (r) {
      var meta = statusMeta[r.status];
      return (
        '<tr>' +
          '<td class="key-cell">' + escapeHtml(r.key) + '</td>' +
          '<td class="val-cell">' + renderValueList(r.valuesA) + '</td>' +
          '<td class="val-cell">' + renderValueList(r.valuesB) + '</td>' +
          '<td><span class="status-badge ' + meta.cls + '">' + meta.icon + ' ' + escapeHtml(meta.label) + '</span></td>' +
        '</tr>'
      );
    }).join("");

    compareTable.hidden = rows.length === 0;
  }

  compareToggleBtn.addEventListener("click", function () {
    var willShow = compareCard.hidden;
    compareCard.hidden = !willShow;
    compareToggleBtn.textContent = willShow ? t("compareToggleClose") : t("compareToggle");
    if (willShow) track("compare_toggle_open");
  });

  compareBtn.addEventListener("click", function () {
    track("compare_run");
    renderCompare();
  });
  compareInputA.addEventListener("keydown", function (ev) { if (ev.key === "Enter") { track("compare_run"); renderCompare(); } });
  compareInputB.addEventListener("keydown", function (ev) { if (ev.key === "Enter") { track("compare_run"); renderCompare(); } });

  // theme toggle
  var THEME_KEY = "qpv-theme";
  function applyTheme(theme) {
    if (theme === "light" || theme === "dark") {
      document.documentElement.setAttribute("data-theme", theme);
    } else {
      document.documentElement.removeAttribute("data-theme");
    }
  }
  var savedTheme = null;
  try { savedTheme = localStorage.getItem(THEME_KEY); } catch (e) { /* ignore */ }
  applyTheme(savedTheme);
  themeToggle.addEventListener("click", function () {
    var current = document.documentElement.getAttribute("data-theme");
    var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    var effectiveDark = current ? current === "dark" : prefersDark;
    var next = effectiveDark ? "light" : "dark";
    applyTheme(next);
    track("theme_toggle", { theme: next });
    try { localStorage.setItem(THEME_KEY, next); } catch (e) { /* ignore */ }
  });

  // language switch: progressive enhancement over the plain <a href> links —
  // swap all page text client-side (no reload, keeps input/parsed state) and
  // sync the URL bar via pushState; without JS the links still navigate to
  // the real static per-language page.
  function setMeta(selector, attr, value) {
    var el = document.querySelector(selector);
    if (el) el.setAttribute(attr, value);
  }

  function applyLangToDom(lang) {
    if (!I18N_ALL[lang] || lang === currentLang) return;
    currentLang = lang;
    var dict = I18N_ALL[lang];

    document.documentElement.lang = dict.htmlLang;
    document.title = dict.title;

    setMeta('meta[name="description"]', "content", dict.description);
    setMeta('meta[name="keywords"]', "content", dict.keywords);
    setMeta('meta[property="og:title"]', "content", dict.title);
    setMeta('meta[property="og:description"]', "content", dict.ogDescription);
    setMeta('meta[property="og:url"]', "content", CANONICALS[lang]);
    setMeta('meta[property="og:locale"]', "content", dict.ogLocale);
    setMeta('meta[name="twitter:title"]', "content", dict.title);
    setMeta('meta[name="twitter:description"]', "content", dict.ogDescription);
    setMeta('link[rel="canonical"]', "href", CANONICALS[lang]);

    taglineEl.textContent = dict.tagline;
    urlInput.placeholder = dict.inputPlaceholder;
    parseBtn.textContent = dict.btnParse;
    exampleBtn.textContent = dict.btnExample;
    clearBtn.textContent = dict.btnClear;
    hintEl.innerHTML = dict.hintHtml;
    emptyTextEl.textContent = dict.emptyText;
    tableTitleEl.textContent = dict.tableTitle;
    copyJsonBtn.textContent = dict.copyJsonBtn;
    footerEl.textContent = dict.footer;
    themeToggle.title = dict.themeToggleLabel;
    themeToggle.setAttribute("aria-label", dict.themeToggleLabel);

    editModeBtn.textContent = editMode ? dict.doneEditing : dict.editParams;
    fullUrlHeadingEl.textContent = dict.fullUrlHeading;
    baseUrlInput.placeholder = dict.baseUrlPlaceholder;
    copyFullUrlBtn.textContent = dict.copy;

    compareToggleBtn.textContent = compareCard.hidden ? dict.compareToggle : dict.compareToggleClose;
    compareHeadingEl.textContent = dict.compareHeading;
    compareBtn.textContent = dict.compareBtn;

    document.querySelectorAll(".lang-switch a").forEach(function (a) {
      if (a.getAttribute("data-lang") === lang) a.setAttribute("aria-current", "true");
      else a.removeAttribute("aria-current");
    });

    if (editMode) {
      renderEditTable();
      updateFullUrlPreview();
    } else if (currentEntries.length) {
      render(currentEntries);
    }
    if (!compareTable.hidden) renderCompare();
  }

  function detectLangFromPath() {
    var path = window.location.pathname;
    if (/\/en\/?(?:index\.html)?$/.test(path)) return "en";
    if (/\/ja\/?(?:index\.html)?$/.test(path)) return "ja";
    return "zh";
  }

  document.querySelectorAll(".lang-switch a").forEach(function (a) {
    a.addEventListener("click", function (ev) {
      var lang = a.getAttribute("data-lang");
      if (!lang || lang === currentLang) { ev.preventDefault(); return; }
      ev.preventDefault();
      track("lang_switch", { lang: lang });
      applyLangToDom(lang);
      history.pushState({ lang: lang }, "", a.getAttribute("href"));
    });
  });

  window.addEventListener("popstate", function (ev) {
    applyLangToDom((ev.state && ev.state.lang) || detectLangFromPath());
  });

  // auto-load from current page URL if it carries its own query/hash params
  var selfHref = window.location.href;
  var selfQs = extractQueryString(selfHref);
  if (selfQs) {
    urlInput.value = selfHref;
    doParse();
  } else {
    render([]);
  }
})();
</script>
</body>
</html>
